<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super World Computer Beta Testnet Faucet</title>
    <link rel="icon" href="https://developers.quarkchain.io/images/qkc_favicon.png" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/web3@1.5.2/dist/web3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>

            backdrop-filter: blur(10px);

            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>

<body class="bg-gray-50 min-h-screen">
    <nav class="glass fixed w-full z-10 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600">Super World Computer Beta Testnet Faucet</h1>
            <button id="connectWallet" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg transition duration-300">
                Connect Wallet
            </button>
        </div>
    </nav>

    <main class="container mx-auto pt-24 px-4">
        <div class="grid md:grid-cols-2 gap-8">
            <div class="glass rounded-xl p-6 shadow-lg">
                <h2 class="text-xl font-semibold mb-6 text-gray-800">Faucet</h2>
                <div class="space-y-4">
                    <div class="flex items-center justify-between p-4 bg-white rounded-lg">
                        <span class="text-gray-600">Available Tokens:</span>
                        <span id="payoutInput" class="font-medium text-blue-600">1000 QKC</span>
                    </div>
                    <button id="claimButton" disabled class="w-full bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 text-white py-3 rounded-lg transition duration-300">
                        Claim Tokens
                    </button>
                    <div id="claimStatus"  class="text-center text-sm text-gray-600 hidden"></div>
                </div>
            </div>

            <div class="glass rounded-xl p-6 shadow-lg">
                <h2 class="text-xl font-semibold mb-6 text-gray-800">Token Swap</h2>
                <div class="space-y-4">
                    <div class="bg-white rounded-lg p-4">
                        <label class="block text-sm text-gray-600 mb-2">You Pay</label>
                        <div class="flex items-center">
                            <input id="ethAmount" type="number" class="flex-1 p-2 border rounded-lg" placeholder="0.0">
                            <span class="ml-2 font-medium">SepoliaETH</span>
                        </div>
                    </div>
                    <div class="flex justify-center">
                        <button class="p-2 rounded-full bg-gray-100 hover:bg-gray-200 transition duration-300">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path>
                            </svg>
                        </button>
                    </div>
                    <div class="bg-white rounded-lg p-4">
                        <label class="block text-sm text-gray-600 mb-2">You Receive</label>
                        <div class="flex items-center">
                            <input id="qkcAmount" type="number" class="flex-1 p-2 border rounded-lg" placeholder="0.0" readonly="">
                            <span class="ml-2 font-medium">QKC</span>
                        </div>
                    </div>
                    <button id="swapButton" disabled class="w-full bg-gradient-to-r from-green-500 to-green-600 hover:from-green-600 hover:to-green-700 text-white py-3 rounded-lg transition duration-300">
                        Swap Tokens
                    </button>
                    <div id="swapStatus" class="text-center text-sm text-gray-600 hidden"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let web3;
        let userAccount;
        let server;
        let target;

        const connectWalletBtn = document.getElementById('connectWallet');
        const claimButton = document.getElementById('claimButton');
        const swapButton = document.getElementById('swapButton');
        const ethAmount = document.getElementById('ethAmount');
        const qkcAmount = document.getElementById('qkcAmount');
        const swapStatus = document.getElementById('swapStatus');
        const claimStatus = document.getElementById('claimStatus');

        connectWalletBtn.addEventListener('click', async () => {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    web3 = new Web3(window.ethereum);
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    userAccount = accounts[0];
                    connectWalletBtn.textContent = userAccount.substring(0, 6) + '...' + userAccount.substring(38);
                    swapButton.disabled = false;
                    claimButton.disabled = false;
                } catch (error) {
                    console.error(error);
                }
            } else {
                alert('Please install MetaMask!');
            }
        });
        claimButton.addEventListener('click', async () => {
            if (!userAccount) {
                alert('Please connect your wallet first!');
                return;
            }

            claimStatus.textContent = 'Claiming tokens...';
            server.send(JSON.stringify({address: userAccount}));
        });

        ethAmount.addEventListener('input', (e) => {
            const eth = parseFloat(e.target.value) || 0;
            qkcAmount.value = (eth * 10000).toFixed(2);
        });

        swapButton.addEventListener('click', async () => {
            const amount = ethAmount.value;
            swapStatus.classList.remove('hidden');

            if (amount !== undefined && amount < 0.01) {
                swapStatus.textContent = 'The minimum SepoliaETH we support is 0.01.';
                swapStatus.className = 'mt-4 text-center text-red-400';
            } else {
                swapStatus.textContent = 'Swapping...';
                swapStatus.className = 'mt-4 text-center text-yellow-400';

                const transactionParameters = {
                    from: userAccount,
                    to: target,
                    value: web3.utils.toHex(web3.utils.toWei(amount, "ether")),
                    gas: "21000",
                };

                try {
                    const txHash = await window.ethereum.request({
                        method: "eth_sendTransaction",
                        params: [transactionParameters],
                    });

                    swapStatus.textContent = 'Transaction succeed, transaction hash: ' + txHash;
                    swapStatus.className = 'text-center text-green-400';
                    server.send(JSON.stringify({hash: txHash}));
                } catch (error) {
                    swapStatus.textContent = 'transaction fail' + error.message;
                    swapStatus.className = 'text-center text-red-400';
                }
            }
        });

        var reconnect = function() {
            server = new WebSocket("ws://127.0.0.1:81/api");
            // server = new WebSocket("ws://65.109.90.160:81/api");
            // server = new WebSocket("wss://faucet.beta.testnet.l2.quarkchain.io:81/api");

            server.onmessage = function(event) {
                var msg = JSON.parse(event.data);
                if (msg === null) {
                    return;
                }

                if (msg.funds !== undefined) {
                    target = msg.target
                }
                if (msg.payout !== undefined) {
                    document.getElementById('payoutInput').textContent = msg.payout + ' QKC'
                }
                if (msg.error !== undefined) {
                    if (msg.source === "") {
                        noty({layout: 'topCenter', text: msg.error, type: 'error', timeout: 5000, progressBar: true});
                    } else {
                        let status = claimStatus;
                        if (msg.source === "swap") {
                            status = swapStatus;
                        }

                        status.textContent = msg.error;
                        status.className = 'text-center text-red-400';
                    }

                }
                if (msg.success !== undefined) {
                    let status = claimStatus;
                    if (msg.source === "swap") {
                        status = document.getElementById('swapStatus');
                    }

                    status.textContent = msg.success;
                    status.className = 'text-center text-green-400';
                }
            }
            server.onclose = function() { setTimeout(reconnect, 5000); };
        }

        reconnect();
    </script>

</body></html>
